<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saborytec | Inicio</title>
    <!-- Google Fonts para Bebas Neue e Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- En el <head> de tu index/tiendas.html -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/inicio.css"> <!-- Aquí va tu CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Fondo de Pantalla (Texto Gigante) -->
    <div class="bg-text">
        <h1 class="bg-title">INICIO</h1>
    </div>

    <header class="navbar">
        <div class="logo">SABORYTEC</div>
        <nav class="nav-links">
            <a href="inicio.html" class="active">INICIO</a>
            <a href="explorar.html">EXPLORAR</a>
            <a href="carrito.html">CARRITO</a>
            <a href="#">PEDIDOS</a>  
        </nav>
        <button class="cart-btn"><i class="fas fa-user"></i> CERRAR SESIÓN</button>
    </header>

    <main class="dashboard">
        <div class="content-container">

            <!-- Banner Jumbo de Bienvenida -->
            <section class="welcome-banner jumbo">
                <div class="banner-info">
                    <span class="tag">BIENVENID@S</span>
                    <h2 id="user-welcome">Hola, Invitado</h2>
                    <p>Ordena con anticipación y recoge en el momento perfecto en tus tiendas favoritas del campus.</p>
                    <button class="btn-new-order" onclick="window.location.href='explorar.html'">
                        + NUEVO PEDIDO
                    </button>
                </div>
                <div class="glass-logo large">
                    <img src="../assets/img/LOGO-PNG.png" alt="Logo Saborytec">
                </div>
            </section>

            <!-- Sección de Tiendas -->
            <section class="section-container">
                <div class="section-header">
                    <h3>Tiendas Disponibles</h3>
                    <a href="#" class="view-all">VER TODAS</a>
                </div>
                <div class="stores-grid" id="stores-grid">
                    <!-- JS cargará las store-card aquí -->
                </div>
            </section>

            <!-- Sección de Productos Destacados -->
            <section class="section-container">
                <div class="section-header">
                    <h3>Destacados de hoy</h3>
                </div>
                <div class="featured-grid" id="featured-grid">
                    <!-- JS cargará las product-card hot aquí -->
                </div>
            </section>

            <footer style="text-align: center; padding: 40px; color: var(--text-muted); position: relative; z-index: 10;">
                <p>© 2026 Saborytec. <br> Autores: FREDY & VICTOR</p>
            </footer>
        </div>
    </main>

    <script src="../js/navegacion/inicio.js"></script>
</body>
</html>
