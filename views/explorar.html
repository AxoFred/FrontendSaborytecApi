<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saborytec | Explorar</title>
    <link rel="stylesheet" href="../css/explorar.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">SABORY<span>TEC</span></div>
        <nav class="nav-links">
            <a href="inicio.html">INICIO</a>
            <a href="#" class="active">EXPLORAR</a>
            <a href="#">PEDIDOS</a>
            <a href="#">CARRITO</a>
        </nav>
        <div class="user-pill">
            <div class="avatar"></div>
            <span>AxoFred</span>
        </div>
    </header>

    <main class="explore-container">
        <div class="bg-text">
            <h1 class="bg-title">EXPLORE</h1>
        </div>

        <div class="content-wrapper">
            <section class="search-section">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="¿Qué se te antoja hoy?">
                </div>
            </section>

            <section class="categories-nav">
                <button class="cat-btn active">Todo</button>
                <button class="cat-btn">Desayunos</button>
                <button class="cat-btn">Comida Rápida</button>
                <button class="cat-btn">Bebidas</button>
                <button class="cat-btn">Snacks</button>
                <button class="cat-btn">Postres</button>
            </section>

            <section class="results-grid">
                <div class="explore-card">
                    <div class="card-img">
                        <img src="https://i.ibb.co/VmqS8M6/iced-coffee-png.png" alt="Producto">
                    </div>
                    <div class="card-body">
                        <span class="store-tag">Central Coffee</span>
                        <h4>Frappé Mocha</h4>
                        <div class="card-footer">
                            <span class="price">$55.00</span>
                            <button class="mini-add">+</button>
                        </div>
                    </div>
                </div>

                <div class="explore-card">
                    <div class="card-img">
                        <img src="https://pngimg.com/d/burger_sandwich_PNG4135.png" alt="Producto">
                    </div>
                    <div class="card-body">
                        <span class="store-tag">Grill & Go</span>
                        <h4>Double Cheese</h4>
                        <div class="card-footer">
                            <span class="price">$95.00</span>
                            <button class="mini-add">+</button>
                        </div>
                    </div>
                </div>

                <div class="explore-card">
                    <div class="card-img">
                        <img src="https://pngimg.com/d/cookie_PNG13656.png" alt="Producto">
                    </div>
                    <div class="card-body">
                        <span class="store-tag">Bakery Lab</span>
                        <h4>Cookie Box</h4>
                        <div class="card-footer">
                            <span class="price">$40.00</span>
                            <button class="mini-add">+</button>
                        </div>
                    </div>
                </div>

                <div class="explore-card">
                    <div class="card-img">
                        <img src="https://i.ibb.co/VmqS8M6/iced-coffee-png.png" alt="Producto">
                    </div>
                    <div class="card-body">
                        <span class="store-tag">Central Coffee</span>
                        <h4>Latte Art</h4>
                        <div class="card-footer">
                            <span class="price">$38.00</span>
                            <button class="mini-add">+</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

</body>
</html>
