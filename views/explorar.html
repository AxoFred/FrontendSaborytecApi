<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saborytec | Explorar</title>
    <link rel="stylesheet" href="../css/explorar.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">SABORYTEC</div>
        <nav class="nav-links">
            <a href="inicio.html" class="active">INICIO</a>
            <a href="explorar.html">EXPLORAR</a>
            <a href="carrito.html">CARRITO</a>
            <a href="#">PEDIDOS</a>
        </nav>
        <button class="cart-btn"><i class="fas fa-user"></i> CERRAR SESIÓN</button>
    </header>

    <div class="bg-text">
        <h1 class="bg-title">EXPLORE</h1>
    </div>
    <div class="container-food-menu">
        <div class="menu-header">
            <h1 class="menu-title">Catálogo de Productos</h1>
            <p class="menu-subtitle">Explora los mejores sabores de nuestra región</p>

            <form id="filterForm" class="st-filter-panel">
                <div class="st-search-row">
                    <div class="st-search-group">
                        <input type="text" id="inputBuscar" class="st-search-input"
                            placeholder="¿Qué se te antoja hoy?">
                        <button type="submit" class="st-btn-search"><i class="fas fa-search"></i></button>
                    </div>

                    <button type="button" class="st-btn-toggle-filters" onclick="toggleFilters()">
                        <span>Filtros</span>
                    </button>
                </div>

                <div class="st-filters-expandable" id="filtersPanel">
                    <div class="st-options-group">

                        <!-- Selector de Categorías -->
                        <div class="st-custom-select" id="selectCategoria">
                            <div class="st-select-trigger">
                                <span id="textCategoria">Categorías</span>
                                <div class="arrow"></div>
                            </div>
                            <div class="st-custom-options" id="optionsCategoria">
                                <!-- Se llena vía API -->
                            </div>
                            <input type="hidden" id="hiddenCategoria" name="categoria">
                        </div>

                        <!-- Selector de Tiendas -->
                        <div class="st-custom-select" id="selectTienda">
                            <div class="st-select-trigger">
                                <span id="textTienda">Tiendas</span>
                                <div class="arrow"></div>
                            </div>
                            <div class="st-custom-options" id="optionsTienda">
                                <!-- Se llena vía API -->
                            </div>
                            <input type="hidden" id="hiddenTienda" name="tienda">
                        </div>

                        <button type="button" id="btnReset" class="st-btn-reset" style="display:none;">Limpiar</button>
                    </div>
                </div>
            </form>
        </div>
        <!-- Grid de productos vacío -->
        <div class="food-grid" id="foodGrid">
            <p style="text-align: center; color: white; padding: 40px;">Cargando productos...</p>
        </div>
    </div>
    <script src="../js/navegacion/explorar.js"></script>
</body>
</html>
