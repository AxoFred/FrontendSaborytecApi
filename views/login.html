<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saborytec | Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-container">
        <div class="bg-text">
            <h1 class="bg-title">ACCESO</h1>
        </div>

        <section class="login-card">
            <header class="login-header">
                <div class="logo-mini">SABORY<span>TEC</span></div>
                <h2>Bienvenido</h2>
                <p>Ingresa tus credenciales</p>
            </header>

            <form class="login-form" id="loginForm">

    <div class="input-group">
        <label>CORREO ELECTRÓNICO</label>
        <input type="email" id="correo" placeholder="ejemplo@smartin.tecnm.mx" required>
    </div>

    <div class="input-group">
        <label>CONTRASEÑA</label>
        <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-login">ENTRAR</button>

</form>

        </section>

        <a href="bienvenida.html" class="back-link">← VOLVER</a>
    </main>

    <script src="../js/login.js"></script>
</body>
</html>
